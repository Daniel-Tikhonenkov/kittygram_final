volumes:
  pg_data_production:
  static_production:
  media_production:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data_production:/var/lib/postgresql/data
  backend:
    image: quassider/kittygram_backend
    env_file: .env
    volumes:
      - static_production:/backend_static
      - media_production:/app/media
    depends_on:
      - db
  frontend:
    env_file: .env
    image: quassider/kittygram_frontend
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static_production:/frontend_static
  gateway:
    image: quassider/kittygram_gateway
    env_file: .env
    ports:
      - 9000:80
    volumes:
      - static_production:/static
      - media_production:/media
    depends_on:
      - backend
